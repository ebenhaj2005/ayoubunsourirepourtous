<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin :: head(title='Admin - Dashboard')}"></head>
<body>

<div th:replace="~{fragments/admin :: topbar}"></div>

<section class="admin-wrap">
    <div class="container">
        <div class="admin-header">
            <h1>Dashboard</h1>
            <a class="btn" th:href="@{/admin/projects/new}">+ Nouveau projet</a>
        </div>

        <div class="admin-card">
            <h2>Projets</h2>

            <div th:if="${projects == null || #lists.isEmpty(projects)}" class="empty-state">
                <p>Aucun projet. Clique sur “Nouveau projet”.</p>
            </div>

            <table class="admin-table" th:if="${projects != null && !#lists.isEmpty(projects)}">
                <thead>
                <tr>
                    <th>Titre</th>
                    <th>Lieu</th>
                    <th>Date</th>
                    <th style="width:220px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${projects}">
                    <td th:text="${p.title}">Titre</td>
                    <td th:text="${p.lieu}">Lieu</td>
                    <td th:text="${p.date != null ? #temporals.format(p.date, 'dd/MM/yyyy') : '-'}">Date</td>
                    <td th:text="${p.description}">Description</td>
                    <td class="actions">
                        <a class="btn-secondary" th:href="@{/admin/projects/{id}/edit(id=${p.id})}">Modifier</a>
                        <form th:action="@{/admin/projects/{id}/delete(id=${p.id})}" method="post" style="display:inline;">
                            <button class="btn-danger" type="submit">Supprimer</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>
</section>

</body>
</html>

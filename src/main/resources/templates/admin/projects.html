<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/site :: head(title='Nos Projets')}"></head>
<body>

<div th:replace="~{fragments/site :: header(active='projects')}"></div>

<section class="page-hero">
    <div class="container">
        <h1>Nos projets</h1>
        <p>Des actions concrètes, portées par nos jeunes, pour changer des vies durablement.</p>
    </div>
</section>

<section class="section">
    <div class="container">

        <!-- Empty state -->
        <div class="empty-state" th:if="${projects == null || #lists.isEmpty(projects)}">
            <h2>Aucun projet pour le moment</h2>
            <p>Reviens bientôt, de nouveaux projets arrivent.</p>
        </div>

        <!-- Projects grid -->
        <div class="projects-grid" th:if="${projects != null && !#lists.isEmpty(projects)}">
            <article class="project-card" th:each="p : ${projects}">
                <a class="project-card-link" th:href="@{/projects/{id}(id=${p.id})}">
                    <div class="project-thumb">

                        <!-- image = première photo si dispo -->
                        <img
                                th:if="${p.photos != null and !p.photos.isEmpty()}"
                                th:src="@{'/uploads/' + ${p.photos[0].filename}}"
                                alt="Photo du projet" />

                        <!-- sinon placeholder -->
                        <div th:if="${p.photos == null or p.photos.isEmpty()}" class="project-thumb-placeholder">
                            <span>Projet</span>
                        </div>

                    </div>

                    <div class="project-body">
                        <h3 th:text="${p.title}">Titre projet</h3>

                        <p class="muted"
                           th:if="${p.description != null}"
                           th:text="${#strings.abbreviate(p.description, 140)}">
                            Description…
                        </p>

                        <div class="project-meta">
                            <span th:if="${p.date != null}"
                                  th:text="${#temporals.format(p.date, 'dd/MM/yyyy')}">
                                Date
                            </span>
                        </div>
                    </div>
                </a>
            </article>
        </div>

    </div>
</section>

<div th:replace="~{fragments/site :: footer}"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin :: head(title=${pageTitle})}"></head>
<body>

<div th:replace="~{fragments/admin :: topbar}"></div>

<section class="admin-wrap">
    <div class="container">

        <div class="admin-header">
            <h1 th:text="${pageTitle}">Projet</h1>
            <a class="btn-secondary" th:href="@{/admin/projects}">← Retour</a>
        </div>

        <form class="admin-card"
              th:action="@{${formAction}}"
              th:object="${project}"
              method="post"
              enctype="multipart/form-data">

            <div class="form-grid">
                <div class="form-field">
                    <label>Titre</label>
                    <input type="text" th:field="*{title}" required>
                </div>

                <div class="form-field">
                    <label>Lieu</label>
                    <input type="text" th:field="*{lieu}" required>
                </div>

                <div class="form-field form-field-full">
                    <label>Description</label>
                    <textarea rows="5" th:field="*{description}"></textarea>
                </div>

                <div class="form-field">
                    <label>Date</label>
                    <input type="date" th:field="*{date}">
                </div>

                <div class="form-field form-field-full">
                    <label>Photos (plusieurs)</label>
                    <!-- IMPORTANT : name="photos" (RequestParam), PAS th:field -->
                    <input type="file" name="photoFiles" accept="image/*" multiple>
                    <p class="muted">Tu peux sélectionner plusieurs images.</p>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn" type="submit">Enregistrer</button>
            </div>
        </form>

    </div>
</section>

</body>
</html>

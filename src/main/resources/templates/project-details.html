<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/site :: head(title=${project.title})}"></head>
<body>

<div th:replace="~{fragments/site :: header('projects')}"></div>

<!-- HERO -->
<section class="project-hero">
    <div class="container">
        <a class="back-link" th:href="@{/projects}">
            <span class="back-ico" aria-hidden="true">←</span>
            Retour aux projets
        </a>

        <div class="hero-card">
            <div class="hero-top">
                <div class="hero-text">
                    <h1 class="project-title" th:text="${project.title}">Titre</h1>

                    <!-- Lieu sous le titre -->
                    <div class="project-sub">
                        <span class="pill" th:if="${project.lieu != null && !#strings.isEmpty(project.lieu)}">
                            <span class="pill-ico" aria-hidden="true">📍</span>
                            <span th:text="${project.lieu}">Lieu</span>
                        </span>

                        <span class="pill">
                            <span class="pill-ico" aria-hidden="true">📅</span>
                            <span th:text="${project.date != null ? project.date : '-'}">Date</span>
                        </span>
                    </div>
                </div>
            </div>


        </div>
    </div>
</section>

<!-- CONTENU -->
<section class="section project-section">
    <div class="container">

        <div class="project-layout">

            <!-- DESCRIPTION -->
            <article class="card content-card">
                <div class="card-head">
                    <h2>Description</h2>
                </div>

                <!-- rendu “lecture” : espaces + retours à la ligne -->
                <div class="rich-text" th:text="${project.description}">
                    Texte...
                </div>
            </article>

            <!-- GALERIE -->
            <aside class="card gallery-card">
                <div class="card-head">
                    <h2>Galerie</h2>
                    <p class="muted small">Clique sur une photo pour l’agrandir.</p>
                </div>

                <div class="empty-photos"
                     th:if="${project.photos == null or project.photos.isEmpty()}">
                    <div class="empty-ico" aria-hidden="true">🖼️</div>
                    <p class="muted">Pas encore de photos pour ce projet.</p>
                </div>

                <div class="gallery-grid"
                     th:if="${project.photos != null and !project.photos.isEmpty()}">

                    <button class="gallery-item"
                            type="button"
                            th:each="ph, iter : ${project.photos}"
                            th:attr="data-src=@{/uploads/{file}(file=${ph.filename})}, data-index=${iter.index}">
                        <img class="gallery-img"
                             th:src="@{/uploads/{file}(file=${ph.filename})}"
                             alt="Photo projet">
                        <span class="zoom-badge" aria-hidden="true">🔍</span>
                    </button>

                </div>
            </aside>

        </div>
    </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lb-close" type="button" aria-label="Fermer (ESC)">✕</button>
    <button class="lb-nav lb-prev" type="button" aria-label="Photo précédente">‹</button>
    <button class="lb-nav lb-next" type="button" aria-label="Photo suivante">›</button>

    <div class="lb-inner" role="dialog" aria-modal="true">
        <img id="lb-img" alt="Photo agrandie">
    </div>

    <div class="lb-counter" id="lb-counter">1 / 1</div>
</div>

<div th:replace="~{fragments/site :: footer}"></div>

<style>
    /* ====== look moderne (sans toucher à ton CSS global) ====== */
    .project-hero{
        padding: clamp(28px, 4vw, 56px) 0;
        background:
                radial-gradient(900px 400px at 10% 10%, rgba(159,226,191,.22), transparent 70%),
                radial-gradient(900px 400px at 90% 20%, rgba(159,226,191,.14), transparent 70%);
    }
    .hero-card{
        background: rgba(255,255,255,.75);
        border: 1px solid rgba(0,0,0,.06);
        border-radius: 18px;
        padding: clamp(16px, 2.5vw, 28px);
        box-shadow: 0 10px 30px rgba(0,0,0,.08);
        backdrop-filter: blur(8px);
    }
    .back-link{
        display:inline-flex;
        align-items:center;
        gap:10px;
        text-decoration:none;
        margin-bottom: 14px;
        color: inherit;
        opacity:.85;
    }
    .back-link:hover{opacity:1}
    .back-ico{
        width:34px;height:34px;border-radius:999px;
        display:grid;place-items:center;
        border: 1px solid rgba(0,0,0,.10);
        background: rgba(255,255,255,.65);
    }
    .project-title{
        font-size: clamp(32px, 4vw, 56px);
        line-height: 1.05;
        letter-spacing: -0.02em;
        margin: 0;
    }
    .project-sub{
        margin-top: 12px;
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        align-items:center;
    }
    .pill{
        display:inline-flex;
        align-items:center;
        gap:8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(0,0,0,.08);
        background: rgba(255,255,255,.7);
        font-size: 14px;
    }
    .pill-ico{opacity:.9}
    .hero-desc{
        margin: 16px 0 0;
        color: rgba(0,0,0,.72);
        font-size: 16px;
        line-height: 1.6;
        max-width: 78ch;
    }

    .project-section{
        padding-top: 22px;
    }

    .project-layout{
        display:grid;
        grid-template-columns: 1.15fr .85fr;
        gap: 18px;
        align-items:start;
    }
    @media (max-width: 900px){
        .project-layout{grid-template-columns: 1fr;}
    }

    .card{
        background: #fff;
        border: 1px solid rgba(0,0,0,.08);
        border-radius: 18px;
        box-shadow: 0 10px 24px rgba(0,0,0,.06);
        overflow:hidden;
    }
    .card-head{
        padding: 16px 16px 10px;
        border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .card-head h2{
        margin:0;
        font-size: 16px;
        letter-spacing: .02em;
        text-transform: uppercase;
        opacity: .9;
    }
    .muted{opacity:.7}
    .small{font-size: 13px}

    /* description agréable à lire */
    .rich-text{
        padding: 16px;
        font-size: 16px;
        line-height: 1.85;
        color: rgba(0,0,0,.78);
        white-space: pre-line; /* garde les retours à la ligne */
    }

    /* galerie */
    .gallery-card .card-head{
        display:flex;
        align-items:baseline;
        justify-content:space-between;
        gap:12px;
    }
    .gallery-grid{
        padding: 14px;
        display:grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
    }
    @media (max-width: 520px){
        .gallery-grid{grid-template-columns: 1fr;}
    }
    .gallery-item{
        position:relative;
        border:0;
        padding:0;
        background:transparent;
        cursor:pointer;
        border-radius: 14px;
        overflow:hidden;
        outline: none;
        box-shadow: 0 8px 16px rgba(0,0,0,.08);
        border: 1px solid rgba(0,0,0,.08);
        transition: transform .15s ease, box-shadow .15s ease;
    }
    .gallery-item:hover{
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(0,0,0,.10);
    }
    .gallery-img{
        width:100%;
        height: 180px;
        object-fit: cover;
        display:block;
    }
    .zoom-badge{
        position:absolute;
        right:10px;
        bottom:10px;
        background: rgba(255,255,255,.85);
        border: 1px solid rgba(0,0,0,.10);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 14px;
        backdrop-filter: blur(6px);
    }

    .empty-photos{
        padding: 18px;
        display:flex;
        gap: 12px;
        align-items:center;
    }
    .empty-ico{font-size: 26px}

    /* LIGHTBOX */
    .lightbox{
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.82);
        display:none;
        z-index: 9999;
    }
    .lightbox.is-open{display:block}
    .lb-inner{
        position:absolute;
        inset: 0;
        display:grid;
        place-items:center;
        padding: 64px 16px 48px;
    }
    .lb-inner img{
        max-width: min(1100px, 92vw);
        max-height: 78vh;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0,0,0,.35);
        background: rgba(255,255,255,.06);
    }
    .lb-close{
        position:absolute;
        top: 14px;
        right: 14px;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,.25);
        background: rgba(255,255,255,.12);
        color: #fff;
        font-size: 20px;
        cursor:pointer;
    }
    .lb-nav{
        position:absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 46px;
        height: 46px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,.25);
        background: rgba(255,255,255,.12);
        color:#fff;
        font-size: 28px;
        cursor:pointer;
    }
    .lb-prev{left: 14px}
    .lb-next{right: 14px}
    .lb-counter{
        position:absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 12px;
        color:#fff;
        font-size: 13px;
        opacity: .85;
        background: rgba(255,255,255,.12);
        border: 1px solid rgba(255,255,255,.20);
        border-radius: 999px;
        padding: 6px 10px;
    }
    body.lb-lock{
        overflow:hidden;
    }
</style>

<script>
    (function () {
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const lbCounter = document.getElementById('lb-counter');
        const btnClose = lb.querySelector('.lb-close');
        const btnPrev = lb.querySelector('.lb-prev');
        const btnNext = lb.querySelector('.lb-next');

        const items = Array.from(document.querySelectorAll('.gallery-item'));
        const sources = items.map(b => b.getAttribute('data-src'));
        let index = 0;

        function openAt(i) {
            if (!sources.length) return;
            index = Math.max(0, Math.min(i, sources.length - 1));
            lbImg.src = sources[index];
            lbCounter.textContent = (index + 1) + " / " + sources.length;

            lb.classList.add('is-open');
            lb.setAttribute('aria-hidden', 'false');
            document.body.classList.add('lb-lock');
        }

        function close() {
            lb.classList.remove('is-open');
            lb.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('lb-lock');
            lbImg.src = "";
        }

        function prev() { openAt(index - 1); }
        function next() { openAt(index + 1); }

        items.forEach((btn) => {
            btn.addEventListener('click', () => {
                const i = parseInt(btn.getAttribute('data-index'), 10);
                openAt(isNaN(i) ? 0 : i);
            });
        });

        btnClose.addEventListener('click', close);
        btnPrev.addEventListener('click', prev);
        btnNext.addEventListener('click', next);

        // cliquer en dehors de l'image ferme
        lb.addEventListener('click', (e) => {
            const inner = lb.querySelector('.lb-inner');
            if (!inner.contains(e.target) || e.target === inner) close();
        });

        // clavier: ESC, flèches
        document.addEventListener('keydown', (e) => {
            if (!lb.classList.contains('is-open')) return;

            if (e.key === 'Escape') close();
            if (e.key === 'ArrowLeft') prev();
            if (e.key === 'ArrowRight') next();
        });
    })();
</script>

</body>
</html>

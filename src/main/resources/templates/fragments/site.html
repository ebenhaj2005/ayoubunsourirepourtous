<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Ayoub Un Sourire Pour l’Éternité</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="icon" th:href="@{/images/images1.jpg}">
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>

<body>

<header th:fragment="header(active)">
    <header class="site-header">
        <div class="container header-container">
            <a th:href="@{/}" class="logo">
                <img th:src="@{/images/logo.jpeg}" alt="Logo">
            </a>

            <button class="mobile-menu-btn" type="button">
                <span></span><span></span><span></span>
            </button>

            <ul class="nav-menu">
                <li><a th:href="@{/}" class="nav-link" th:classappend="${active=='home'} ? ' active' : ''">Accueil</a></li>
                <li><a th:href="@{/projects}" class="nav-link" th:classappend="${active=='projects'} ? ' active' : ''">Nos Projets</a></li>
                <li><a th:href="@{/contact}" class="nav-link" th:classappend="${active=='contact'} ? ' active' : ''">Contact</a></li>
                <li class="nav-admin">
                    <a th:href="@{/admin}" class="nav-link admin-link">Admin</a>
                </li>
            </ul>
        </div>
    </header>
</header>

<footer th:fragment="footer">
    <footer class="site-footer">
        <div class="container">
            <p>Ayoub Un Sourire Pour l’Éternité — Ensemble, construisons un avenir meilleur</p>
            <p>Crée par <a href="https://www.linkedin.com/in/elias-benhaj-b4b022292/">Elias Benhaj</a></p>
        </div>

    </footer>

    <script>
        const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
        const navMenu = document.querySelector('.nav-menu');
        if(mobileMenuBtn && navMenu){
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenuBtn.classList.toggle('active');
                navMenu.classList.toggle('active');
            });
        }
    </script>
</footer>

</body>
</html>

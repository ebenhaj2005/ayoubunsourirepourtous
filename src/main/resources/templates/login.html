<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/site :: head(title='Connexion')}"></head>
<body>

<div th:replace="~{fragments/site :: header(active='')}"></div>

<section class="section">
    <div class="container" style="max-width:520px;">
        <div style="padding:18px;border:1px solid rgba(0,0,0,.08);border-radius:18px;background:#fff;box-shadow:0 10px 24px rgba(0,0,0,.06);">
            <h1 style="margin:0 0 6px;font-size:28px;">Espace admin</h1>
            <p class="muted" style="margin:0 0 14px;">Connecte-toi pour accéder au dashboard.</p>

            <div th:if="${param.error}" style="margin-bottom:10px;padding:10px;border-radius:12px;background:rgba(255,0,0,.06);border:1px solid rgba(255,0,0,.18);">
                Identifiants incorrects.
            </div>

            <div th:if="${param.logout}" style="margin-bottom:10px;padding:10px;border-radius:12px;background:rgba(0,200,0,.08);border:1px solid rgba(0,200,0,.18);">
                Déconnecté.
            </div>

            <form th:action="@{/login}" method="post" style="display:grid;gap:10px;">
                <div style="display:grid;gap:6px;">
                    <label>Username</label>
                    <input name="username" required style="padding:11px 12px;border-radius:14px;border:1px solid rgba(0,0,0,.12);">
                </div>

                <div style="display:grid;gap:6px;">
                    <label>Mot de passe</label>
                    <input name="password" type="password" required style="padding:11px 12px;border-radius:14px;border:1px solid rgba(0,0,0,.12);">
                </div>

                <button type="submit" class="btn" style="padding:11px 14px;border-radius:14px;border:1px solid rgba(0,0,0,.10);background:rgba(159,226,191,.30);font-weight:700;cursor:pointer;">
                    Se connecter →
                </button>
            </form>
        </div>
    </div>
</section>

<div th:replace="~{fragments/site :: footer}"></div>
</body>
</html>
